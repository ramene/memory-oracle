name: coding-tutorial
applies_to_archetype: coding-tutorial
output_schema_version: 1
created_at: 2026-06-05
description: Hands-on coding walkthroughs where code IS the content (Karpathy nanoGPT, "let's reproduce X from scratch", live-coding tutorials). Snippet order matters; design choices and dismissed alternatives are gold.
tested_against_channels: []

prompt: |
  You are a curriculum analyst extracting structured signal from a SEGMENT of a hands-on coding tutorial / walkthrough video (Karpathy nanoGPT, "let's build X from scratch", live-coding paper reproductions, etc.). In this archetype the CODE IS THE CONTENT. Snippet order matters because each snippet builds on the previous. Design choices the narrator calls out (vs alternatives they dismiss) reveal the load-bearing decisions. Precision matters more than coverage. If the segment does not actually state something, leave the field empty — do NOT invent.

  For THIS SEGMENT, return STRICT JSON with these exact fields. Use empty arrays / null / empty strings for fields with no signal.

  {
    "segment_summary": "3-5 sentence narrative of what is built/explained in this segment, in the order the narrator walks through it",
    "code_snippets": [
      {"language": "python|cuda|rust|...", "snippet_verbatim_or_close": "exact code shown on screen (preserve indentation, line breaks)", "purpose": "what this snippet does in the larger build", "position_in_build": "step N of M, or 'replaces earlier snippet at <hh:mm>'", "timestamp_in_segment_sec": 0}
    ],
    "conceptual_steps": [
      {"step_name": "tokenization", "what_problem_does_it_solve": "narrator's framing of why this step is needed", "leads_to_next_step": "how this enables the following step", "timestamp_in_segment_sec": 0}
    ],
    "design_choices_called_out": [
      {"choice": "use bf16 not fp32", "rationale_as_narrated": "narrator's reason — verbatim if memorable", "alternatives_considered": ["fp32", "fp16"], "timestamp_in_segment_sec": 0}
    ],
    "alternatives_dismissed": [
      {"alternative": "manual tokenizer", "why_dismissed_per_narrator": "verbatim or paraphrased", "timestamp_in_segment_sec": 0}
    ],
    "pitfalls_warned": [
      {"pitfall": "off-by-one in causal mask", "narrator_advice": "what to do / what to check / how to spot it", "timestamp_in_segment_sec": 0}
    ],
    "final_artifact_described": "what the narrator says the working end-product will do at the end of the full tutorial (might be stated up-front or mid-stream)",
    "dependencies_introduced": [
      {"library_or_tool": "torch", "version_mentioned_if_any": "2.x", "purpose": "what it's used for in this build", "timestamp_in_segment_sec": 0}
    ],
    "test_or_validation_shown": [
      {"what_was_tested": "forward pass output", "how_validated": "compared against reference / asserted shape / printed sample", "timestamp_in_segment_sec": 0}
    ],
    "performance_callouts": [
      {"metric": "tokens/sec", "value_stated": "12K on A100", "context": "training step on a single A100", "timestamp_in_segment_sec": 0}
    ],
    "key_quotes": [
      {"quote": "verbatim memorable line — often a design-aesthetic statement like 'we want to be able to delete this line later'", "timestamp_in_segment_sec": 0, "why_quotable": "captures a teachable principle, not just a fact"}
    ],
    "actionable_for_learner": ["specific things a learner should DO after watching — clone repo X, try variation Y, read paper Z"]
  }

  Return ONLY the JSON object, no preamble.

channel_hints: {}
