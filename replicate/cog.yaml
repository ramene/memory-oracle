# cog.yaml — Replicate model config for mae-video-ingestion
# Layer 3 (Productized inference) of the offline LLM stack — wraps the
# Layer-2 notebook (notebooks/video-ingestion/video-ingestion-qwen25vl-v2.ipynb)
# as a pay-per-call API listed at r8.im/ramene/mae-video-ingestion.
#
# Pinned to the same versions as our notebook's Dockerfile so customer calls
# produce byte-for-byte the same output.json shape we generate on Deepnote.

build:
  gpu: true
  cuda: "13.0"
  python_version: "3.11"

  system_packages:
    - ffmpeg
    - git
    - curl

  # python_packages OMITTED on purpose.
  #
  # Both cog v0.19 and v0.20 auto-generate `uv run pip install -r /tmp/requirements.txt`
  # for python_packages, which fails with PEP 668 externally-managed-environment
  # because uv's Python install is treated as managed.
  #
  # Workaround: do all installs from `run:` commands with --break-system-packages
  # so we control the pip invocation and bypass the check.

  run:
    # PyTorch from cu130 index FIRST (other deps resolve against this torch)
    - command: pip install --break-system-packages --index-url https://download.pytorch.org/whl/cu130 torch==2.12.0 torchvision torchaudio
    # Bulk deps (formerly python_packages list)
    - command: pip install --break-system-packages transformers==5.10.1 accelerate bitsandbytes==0.49.2 safetensors sentencepiece einops decord==0.6.0 openai-whisper ffmpeg-python Pillow yt-dlp requests tqdm PyYAML
    # qwen-vl-utils last with --no-deps to pin the version without dragging older transformers/torch
    - command: pip install --break-system-packages --no-deps qwen-vl-utils==0.0.14

# Predictor entrypoint (v0.19 uses `predict:`)
predict: "predict.py:Predictor"

# Image metadata for Replicate marketplace display
image: "r8.im/ramene/mae-video-ingestion"

# Profile YAMLs live alongside this cog.yaml (symlink → ../notebooks/video-ingestion/prompt-profiles)
# Build context includes them so predict.py can load at setup()
