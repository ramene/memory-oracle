# cog.yaml — Replicate model config for mae-video-ingestion
# Layer 3 (Productized inference) of the offline LLM stack — wraps the
# Layer-2 notebook (notebooks/video-ingestion/video-ingestion-qwen25vl-v2.ipynb)
# as a pay-per-call API listed at r8.im/ramene/mae-video-ingestion.
#
# Pinned to the same versions as our notebook's Dockerfile so customer calls
# produce byte-for-byte the same output.json shape we generate on Deepnote.

build:
  gpu: true
  cuda: "13.0"
  python_version: "3.11"

  system_packages:
    - ffmpeg
    - git
    - curl

  # Most deps go through cog's python_packages.
  # PyTorch with cu130 wheels has to come via `run` because cog's
  # python_packages doesn't expose --index-url per-package.
  python_packages:
    - transformers==5.10.1
    - accelerate
    - bitsandbytes==0.49.2
    - safetensors
    - sentencepiece
    - einops
    - decord==0.6.0
    - openai-whisper
    - ffmpeg-python
    - Pillow
    - yt-dlp
    - requests
    - tqdm
    - PyYAML

  # Custom-index installs + --no-deps installs go here
  run:
    - command: pip install --index-url https://download.pytorch.org/whl/cu130 torch==2.12.0 torchvision torchaudio
    - command: pip install --no-deps qwen-vl-utils==0.0.14

# Predictor entrypoint
predict: "predict.py:Predictor"

# Image metadata for Replicate marketplace display
image: "r8.im/ramene/mae-video-ingestion"

# Profile YAMLs live alongside this cog.yaml (symlink → ../notebooks/video-ingestion/prompt-profiles)
# Build context includes them so predict.py can load at setup()
