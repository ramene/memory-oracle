# cog.yaml — Replicate model config for mae-video-ingestion
# Layer 3 (Productized inference) of the offline LLM stack — wraps the
# Layer-2 notebook (notebooks/video-ingestion/video-ingestion-qwen25vl-v2.ipynb)
# as a pay-per-call API listed at r8.im/ramene/mae-video-ingestion.
#
# Pinned to the same versions as our notebook's Dockerfile so customer calls
# produce byte-for-byte the same output.json shape we generate on Deepnote.

build:
  gpu: true
  cuda: "13.0"
  python_version: "3.11"

  system_packages:
    - ffmpeg
    - git
    - curl

  # ALL pip installs via `run:` commands using `uv pip install --system`.
  #
  # Bypasses cog v0.20's python_requirements codepath which auto-generates
  # `uv run pip install -r ...` — that hits PEP 668 externally-managed-
  # environment because uv's Python is treated as managed. uv-native
  # `uv pip install --system` is the correct invocation for uv-managed Pythons.
  #
  # Order matters: PyTorch (cu130 index) first so other deps resolve against it,
  # then bulk requirements, then qwen-vl-utils --no-deps to pin the version
  # without dragging in older transformers/torch.
  run:
    - command: uv pip install --system --index-url https://download.pytorch.org/whl/cu130 torch==2.12.0 torchvision torchaudio
    - command: uv pip install --system -r /src/requirements.txt
    - command: uv pip install --system --no-deps qwen-vl-utils==0.0.14

# Predictor entrypoint (cog v0.20+: predict → run)
run: "predict.py:Predictor"

# Image metadata for Replicate marketplace display
image: "r8.im/ramene/mae-video-ingestion"

# Profile YAMLs live alongside this cog.yaml (symlink → ../notebooks/video-ingestion/prompt-profiles)
# Build context includes them so predict.py can load at setup()
